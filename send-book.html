<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ออกเลขส่งหนังสือ - กก.สืบสวน 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #0f172a; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div class="bg-gradient-to-b from-slate-900 to-blue-900 h-52 flex flex-col items-center justify-center text-white rounded-b-[3rem] shadow-2xl">
        <h1 class="text-2xl font-bold">ออกเลขส่งหนังสือ</h1>
        <p class="text-blue-300 text-sm mt-1" id="userNameDisplay">กำลังโหลดข้อมูลผู้ส่ง...</p>
    </div>

    <div class="max-w-md mx-auto px-6 -mt-12">
        <div class="glass-card rounded-[2.5rem] shadow-2xl p-8 space-y-5">
            
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1 ml-1">เรื่อง (Subject)</label>
                <textarea id="subject" rows="2" placeholder="ระบุชื่อเรื่องหนังสือ" class="w-full px-4 py-3 rounded-2xl border border-gray-300 focus:ring-2 focus:ring-blue-600 outline-none text-sm"></textarea>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1 ml-1">ถึง (Receiver)</label>
                <input type="text" id="receiver" placeholder="ระบุหน่วยงานปลายทาง" class="w-full px-4 py-3 rounded-2xl border border-gray-300 focus:ring-2 focus:ring-blue-600 outline-none text-sm">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1 ml-1">แนบไฟล์เอกสาร (PDF/รูปภาพ)</label>
                <input type="file" id="fileInput" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>

            <hr class="border-gray-100">

            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1 ml-1">ผู้ส่ง (Sender)</label>
                <input type="text" id="senderName" readonly class="w-full px-4 py-3 rounded-2xl border border-gray-100 bg-gray-50 text-gray-500 text-sm font-semibold outline-none">
            </div>

            <button onclick="submitSendBook()" id="btnSubmit" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-2xl shadow-xl transition transform active:scale-95 flex items-center justify-center text-lg">
                <span>ออกเลขส่งหนังสือ</span>
            </button>

            <p class="text-center text-[10px] text-slate-400 uppercase tracking-widest">ระบบทะเบียนส่งอิเล็กทรอนิกส์</p>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009665125-8ZItMWUW"; // ใช้ LIFF ID เดิม
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwde12sz8vLxH-14fbIGpWOpeqXVVtfADO2C90SrEH-CNnw-O8BrH_ms5-ikplQgXA/exec";

        let currentUser = {};

        async function main() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                currentUser.userId = profile.userId;
                checkMember(profile.userId);
            }
        }
        main();

        // ตรวจสอบว่าเป็นสมาชิกหรือไม่ เพื่อดึงชื่อยศมาใส่ช่อง Sender
        function checkMember(uid) {
            fetch(`${GAS_URL}?action=getMember&userId=${uid}`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === "success") {
                        document.getElementById("senderName").value = data.name;
                        document.getElementById("userNameDisplay").innerText = "ผู้ส่ง: " + data.name;
                    } else {
                        alert("ไม่พบข้อมูลสมาชิก กรุณาลงทะเบียนก่อน");
                        window.location.href = "register.html"; // ส่งไปหน้าลงทะเบียน
                    }
                });
        }

        async function submitSendBook() {
            const subject = document.getElementById("subject").value;
            const receiver = document.getElementById("receiver").value;
            const sender = document.getElementById("senderName").value;
            const fileInput = document.getElementById("fileInput");

            if (!subject || !receiver) {
                alert("กรุณากรอกข้อมูล เรื่อง และ ถึง ให้ครบถ้วน");
                return;
            }

            const btn = document.getElementById("btnSubmit");
            btn.disabled = true;
            btn.innerHTML = "กำลังบันทึก...";

            let fileData = null;
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                fileData = await toBase64(file);
            }

            const payload = {
                action: "registerOut", // แยก Action สำหรับเลขส่ง
                userId: currentUser.userId,
                subject: subject,
                sender: sender,
                receiver: receiver,
                fileData: fileData, // ส่งไฟล์เข้า GAS ไปเซฟลง Drive
                fileName: fileInput.files.length > 0 ? fileInput.files[0].name : ""
            };

            fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    alert("ออกเลขส่งหนังสือสำเร็จ: " + data.bookNo);
                    liff.closeWindow();
                }
            })
            .catch(err => {
                alert("เกิดข้อผิดพลาด");
                btn.disabled = false;
                btn.innerHTML = "ออกเลขส่งหนังสือ";
            });
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });
    </script>
</body>
</html>
