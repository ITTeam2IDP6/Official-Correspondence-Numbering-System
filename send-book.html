<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทะเบียนส่ง - กก.สืบสวน 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #F8FAFC; }
        .form-card { background: #ffffff; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .input-label { @apply block text-slate-500 text-[11px] font-bold uppercase tracking-wider mb-1 ml-1; }
        .input-style { @apply w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all; }
        .header-gradient { background: linear-gradient(180deg, #0F172A 0%, #1E293B 100%); }
    </style>
</head>
<body class="min-h-screen">

    <div class="header-gradient pt-12 pb-24 px-8 rounded-b-[40px] relative">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-white text-2xl font-bold italic">Registration</h1>
                <p class="text-blue-400 text-[10px] font-bold tracking-[3px] uppercase">เลขส่งหนังสือ</p>
            </div>
            <div class="bg-white/10 p-1 rounded-full border border-white/20">
                <img id="userImg" src="" class="w-10 h-10 rounded-full object-cover bg-slate-800">
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto px-6 -mt-16">
        <div class="form-card p-8 space-y-6">
            
            <div class="space-y-4">
                <div class="flex items-center space-x-2 pb-2 border-b border-slate-100">
                    <div class="w-1 h-4 bg-blue-600 rounded-full"></div>
                    <span class="text-xs font-bold text-slate-800">รายละเอียดหนังสือ</span>
                </div>
                
                <div>
                    <label class="input-label">ถึง (หน่วยงานรับ)</label>
                    <input type="text" id="receiver" placeholder="ระบุหน่วยงานปลายทาง..." class="input-style">
                </div>

                <div>
                    <label class="input-label">เรื่อง</label>
                    <textarea id="subject" rows="2" placeholder="ชื่อเรื่องหนังสือ..." class="input-style"></textarea>
                </div>
            </div>

            <div class="space-y-4 pt-2">
                <div class="flex items-center space-x-2 pb-2 border-b border-slate-100">
                    <div class="w-1 h-4 bg-blue-600 rounded-full"></div>
                    <span class="text-xs font-bold text-slate-800">ข้อมูลผู้บันทึก</span>
                </div>

                <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-100">
                    <label class="input-label text-blue-600">ผู้ดำเนินการ</label>
                    <input type="text" id="senderName" readonly class="bg-transparent w-full text-blue-900 font-bold outline-none cursor-default">
                </div>
                
                <div>
                    <label class="input-label">หมายเหตุ (ถ้ามี)</label>
                    <input type="text" id="note" placeholder="..." class="input-style">
                </div>
            </div>

            <button onclick="submitData()" id="btnSubmit" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center justify-center space-x-2">
                <span id="btnText">บันทึกและออกเลข</span>
            </button>
        </div>
    </div>

    <script>
        // ใส่ GAS_URL และ LIFF_ID เดิมของคุณ
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwde12sz8vLxH-14fbIGpWOpeqXVVtfADO2C90SrEH-CNnw-O8BrH_ms5-ikplQgXA/exec";
        const LIFF_ID = "2009665125-8ZItMWUW";

        async function init() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) liff.login();
            const profile = await liff.getProfile();
            document.getElementById("userImg").src = profile.pictureUrl;
            fetch(`${GAS_URL}?action=getMember&userId=${profile.userId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === "success") {
                        document.getElementById("senderName").value = data.name;
                    }
                });
        }
        init();

        async function submitData() {
            const btn = document.getElementById("btnSubmit");
            btn.disabled = true;
            document.getElementById("btnText").innerText = "กำลังประมวลผล...";
            
            // ใช้ Logic fetch เดิมที่คุณมี...
        }
    </script>
</body>
</html>
