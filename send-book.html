<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทะเบียนส่ง - กก.สืบสวน 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f8fafc; 
        }
        /* กรอบสีแดง */
        .input-card-red {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 2px solid #ef4444;
        }
        .input-label { @apply block text-slate-600 text-[13px] font-bold mb-2 ml-1; }
        .input-style { @apply w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-red-500 focus:ring-1 focus:ring-red-200 transition-all; }
        
        /* สไตล์ข้อความหัวข้อใหม่ */
        .header-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #0f172a;
            text-align: center;
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="pt-8 pb-6 px-6 relative">
        <div class="flex flex-col items-center">
            <p class="text-red-600 text-[10px] font-bold tracking-[0.5em] uppercase mb-1">เลขส่งหนังสือล่าสุด</p>
            <h1 class="header-title" id="bookNoDisplay">ตช 0021.23/...</h1>
        </div>
        <div class="absolute top-6 right-6">
            <img id="userImg" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="w-10 h-10 rounded-full border-2 border-white shadow-sm object-cover">
        </div>
    </div>

    <div class="max-w-md mx-auto px-6 pb-12 space-y-6">
        
        <div class="space-y-4">
            <div>
                <label class="input-label text-slate-800">ถึง (หน่วยงานรับ) *</label>
                <div class="input-card-red p-4">
                    <input type="text" id="receiver" placeholder="ระบุหน่วยงานปลายทาง..." class="input-style">
                </div>
            </div>

            <div>
                <label class="input-label text-slate-800">เรื่อง (Subject) *</label>
                <div class="input-card-red p-4">
                    <textarea id="subject" rows="2" placeholder="ระบุชื่อเรื่องหนังสือ..." class="input-style"></textarea>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex items-center space-x-2">
                <div class="w-1 h-4 bg-red-600 rounded-full"></div>
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">ข้อมูลบันทึก</span>
            </div>

            <div>
                <label class="input-label">หมายเหตุ (Note)</label>
                <div class="input-card-red p-4">
                    <input type="text" id="note" placeholder="..." class="input-style">
                </div>
            </div>

            <div class="bg-slate-100 rounded-2xl p-5 border border-slate-200">
                <label class="block text-slate-500 text-[11px] font-bold uppercase mb-1">ผู้ดำเนินการ</label>
                <input type="text" id="senderName" readonly class="bg-transparent w-full text-slate-900 font-bold outline-none cursor-default text-lg">
            </div>
        </div>

        <div class="pt-2">
            <button onclick="submitData()" id="btnSubmit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center justify-center">
                <span id="btnText" class="text-lg">บันทึกและออกเลข</span>
            </button>
        </div>
    </div>

    <script>
        // ใช้ Script เดิมที่คุณมีได้เลยครับ (อย่าลืมใส่ GAS_URL และ LIFF_ID)
    </script>
</body>
</html>
