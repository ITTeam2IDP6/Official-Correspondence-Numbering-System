<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ออกเลขส่งหนังสือ - กก.สืบสวน 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
        .navy-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .input-field { @apply w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none text-sm transition-all; }
        .label-text { @apply block text-xs font-bold text-slate-600 uppercase mb-1 ml-1; }
    </style>
</head>
<body class="min-h-screen">

    <div class="navy-gradient pb-20 pt-10 px-6 text-center rounded-b-[3rem] shadow-xl">
        <h1 class="text-white text-2xl font-bold">ออกเลขส่งหนังสือ</h1>
        <p class="text-blue-300 text-xs mt-2 opacity-80">กก.สืบสวน 2 บก.สส.ภ.6</p>
    </div>

    <div class="max-w-md mx-auto px-6 -mt-12 pb-10">
        <div class="bg-white rounded-[2rem] shadow-2xl p-8 space-y-5">
            
            <div>
                <label class="label-text">จาก (Sender Unit)</label>
                <input type="text" value="กก.สืบสวน 2 บก.สส.ภ.6" disabled class="input-field bg-gray-50 text-gray-500 font-semibold">
            </div>

            <div>
                <label class="label-text">ถึง (Receiver)</label>
                <input type="text" id="receiver" placeholder="ระบุหน่วยงานปลายทาง" class="input-field">
            </div>

            <div>
                <label class="label-text">เรื่อง (Subject)</label>
                <textarea id="subject" rows="2" placeholder="ระบุชื่อเรื่องหนังสือ" class="input-field"></textarea>
            </div>

            <div>
                <label class="label-text">หมายเหตุ (Note / ถ้ามี)</label>
                <input type="text" id="note" placeholder="ระบุหมายเหตุเพิ่มเติม" class="input-field">
            </div>

            <div>
                <label class="label-text">แนบไฟล์ภาพ / เอกสาร (ถ้ามี)</label>
                <div class="relative">
                    <input type="file" id="fileInput" accept="image/*,.pdf" class="hidden" onchange="updateFileName()">
                    <button onclick="document.getElementById('fileInput').click()" class="w-full py-3 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 text-sm hover:bg-gray-50 transition-all" id="fileNameDisplay">
                        📸 คลิกเพื่อเลือกไฟล์
                    </button>
                </div>
            </div>

            <hr class="border-gray-100">

            <div>
                <label class="label-text text-blue-600">ผู้ส่ง (Authenticated User)</label>
                <div id="senderLoader" class="text-xs text-gray-400 italic">กำลังดึงข้อมูลสมาชิก...</div>
                <input type="text" id="senderName" readonly class="input-field bg-blue-50 border-blue-100 text-blue-800 font-bold hidden">
            </div>

            <button onclick="submitData()" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition transform active:scale-95 text-lg">
                ออกเลขหนังสือส่ง
            </button>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009665125-8ZItMWUW"; // ตรวจสอบว่าตรงกับหน้าออกเลขรับ
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwde12sz8vLxH-14fbIGpWOpeqXVVtfADO2C90SrEH-CNnw-O8BrH_ms5-ikplQgXA/exec";

        let userProfile = {};

        async function initLiff() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                userProfile.userId = profile.userId;
                getMemberInfo(profile.userId);
            }
        }
        initLiff();

        // ดึงชื่อสมาชิกจาก Google Sheet
        function getMemberInfo(uid) {
            fetch(`${GAS_URL}?action=getMember&userId=${uid}`)
                .then(res => res.json())
                .then(data => {
                    const loader = document.getElementById("senderLoader");
                    const input = document.getElementById("senderName");
                    if (data.status === "success") {
                        input.value = data.name;
                        input.classList.remove("hidden");
                        loader.classList.add("hidden");
                    } else {
                        alert("⚠️ คุณยังไม่ได้ลงทะเบียนสมาชิก!\nระบบจะพาไปหน้าลงทะเบียน");
                        window.location.href = "register.html";
                    }
                });
        }

        function updateFileName() {
            const input = document.getElementById('fileInput');
            const display = document.getElementById('fileNameDisplay');
            if(input.files.length > 0) {
                display.innerText = "📁 " + input.files[0].name;
                display.classList.add("text-blue-600", "border-blue-300");
            }
        }

        async function submitData() {
            const receiver = document.getElementById("receiver").value;
            const subject = document.getElementById("subject").value;
            const note = document.getElementById("note").value;
            const sender = document.getElementById("senderName").value;
            const fileInput = document.getElementById("fileInput");

            if (!receiver || !subject) {
                alert("❌ กรุณาระบุ 'ถึง' และ 'เรื่อง'");
                return;
            }

            const btn = document.getElementById("btnSubmit");
            btn.disabled = true;
            btn.innerHTML = "⌛ กำลังบันทึกข้อมูล...";

            let fileData = null;
            let fileName = "";
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                fileName = file.name;
                fileData = await toBase64(file);
            }

            const payload = {
                action: "registerOut",
                userId: userProfile.userId,
                receiver: receiver,
                subject: subject,
                note: note,
                sender: sender,
                fileData: fileData,
                fileName: fileName
            };

            fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    alert("✅ ออกเลขส่งสำเร็จ: " + data.bookNo);
                    liff.closeWindow();
                } else {
                    alert("เกิดข้อผิดพลาด: " + data.message);
                    btn.disabled = false;
                    btn.innerText = "ออกเลขหนังสือส่ง";
                }
            })
            .catch(err => {
                alert("เชื่อมต่อเซิร์ฟเวอร์ไม่ได้");
                btn.disabled = false;
                btn.innerText = "ออกเลขหนังสือส่ง";
            });
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });
    </script>
</body>
</html>
