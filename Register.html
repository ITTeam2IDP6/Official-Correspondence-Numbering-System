<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนสมาชิก - กก.สืบสวน 2 บก.สส.ภ.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #0f172a; /* พื้นหลังน้ำเงินเข้มมาก */
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        input:read-only { 
            background-color: #f8fafc; 
            color: #64748b; 
            cursor: not-allowed; 
            border-color: #e2e8f0;
        }
        select, input {
            transition: all 0.2s ease-in-out;
        }
        select:focus, input:focus {
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <!-- Header Section -->
    <div class="bg-gradient-to-b from-slate-900 to-indigo-950 h-64 flex flex-col items-center justify-center text-white rounded-b-[4rem] shadow-2xl border-b border-indigo-500/30">
        <div class="relative">
            <img id="userImg" class="w-24 h-24 rounded-full border-4 border-indigo-400 shadow-xl mb-3 object-cover" src="https://via.placeholder.com/150" alt="Profile">
            <div class="absolute bottom-2 right-0 w-6 h-6 bg-green-500 border-4 border-slate-900 rounded-full"></div>
        </div>
        <h1 class="text-2xl font-bold tracking-wide">ลงทะเบียนสมาชิก</h1>
        <p class="text-indigo-300 text-sm mt-1">กก.สืบสวน 2 บก.สส.ภ.6</p>
    </div>

    <!-- Form Section -->
    <div class="max-w-md mx-auto px-6 -mt-12">
        <div class="glass-card rounded-[2.5rem] shadow-2xl p-8 space-y-6">
            
            <div class="grid grid-cols-3 gap-3">
                <div class="col-span-1">
                    <label class="block text-xs font-semibold text-indigo-900 uppercase mb-1 ml-1">ยศ</label>
                    <select id="rank" class="w-full px-3 py-3 rounded-2xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none bg-white text-sm">
                        <option value="" disabled selected>เลือก</option>
                        <optgroup label="ชั้นประทวน">
                            <option value="ส.ต.ต.">ส.ต.ต.</option>
                            <option value="ส.ต.ท.">ส.ต.ท.</option>
                            <option value="ส.ต.อ.">ส.ต.อ.</option>
                            <option value="จ.ส.ต.">จ.ส.ต.</option>
                            <option value="ด.ต.">ด.ต.</option>
                        </optgroup>
                        <optgroup label="สัญญาบัตร">
                            <option value="ร.ต.ต.">ร.ต.ต.</option>
                            <option value="ร.ต.ท.">ร.ต.ท.</option>
                            <option value="ร.ต.อ.">ร.ต.อ.</option>
                            <option value="พ.ต.ต.">พ.ต.ต.</option>
                            <option value="พ.ต.ท.">พ.ต.ท.</option>
                            <option value="พ.ต.อ.">พ.ต.อ.</option>
                        </optgroup>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="block text-xs font-semibold text-indigo-900 uppercase mb-1 ml-1">ชื่อ-นามสกุล</label>
                    <input type="text" id="name" placeholder="ระบุชื่อ-นามสกุล" class="w-full px-4 py-3 rounded-2xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-indigo-900 uppercase mb-1 ml-1">เบอร์โทรศัพท์</label>
                <input type="tel" id="phone" placeholder="08x-xxxxxxx" class="w-full px-4 py-3 rounded-2xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1 ml-1">สายงาน</label>
                    <input type="text" id="jobLine" value="สืบสวน" readonly class="w-full px-4 py-3 rounded-2xl border border-gray-200 outline-none text-sm font-semibold">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1 ml-1">สังกัด</label>
                    <input type="text" id="region" value="ภาค 6" readonly class="w-full px-4 py-3 rounded-2xl border border-gray-200 outline-none text-sm font-semibold">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1 ml-1">หน่วยงาน</label>
                <input type="text" id="station" value="กก.สืบสวน 2 บก.สส.ภ.6" readonly class="w-full px-4 py-3 rounded-2xl border border-gray-200 outline-none text-sm font-semibold">
            </div>

            <div>
                <label class="block text-xs font-semibold text-indigo-900 uppercase mb-1 ml-1">Email (Gmail)</label>
                <input type="email" id="email" placeholder="example@gmail.com" class="w-full px-4 py-3 rounded-2xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
            </div>

            <button onclick="submitRegister()" id="btnReg" class="w-full bg-indigo-900 hover:bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-xl shadow-indigo-500/20 transition transform active:scale-95 flex items-center justify-center text-lg mt-4">
                <span>บันทึกข้อมูลและเข้าใช้งาน</span>
            </button>
            
            <p class="text-center text-[10px] text-slate-400 uppercase tracking-widest">Digital Police System v2.0</p>
        </div>
    </div>

    <script>
    // 1. ใส่ URL ที่ได้จากการ Deploy ล่าสุด (ต้องเป็น Version ใหม่หลังจากแก้ Code ใน GAS)
    const LIFF_ID = "2009665125-rCgx9yza"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyUMu39fxB4AwJEH9I1jFQGyPa_AtyR1bciPxpbAMcuD2Y0-DXgFl7HKU6Iv540GweQ/exec";

    async function main() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                document.getElementById("userImg").src = profile.pictureUrl;
            }
        } catch (err) { 
            console.error("LIFF Init Error:", err); 
        }
    }
    main();

    async function submitRegister() {
        const rank = document.getElementById("rank").value;
        const name = document.getElementById("name").value;
        const phone = document.getElementById("phone").value;
        const email = document.getElementById("email").value;
        const jobLine = document.getElementById("jobLine").value;
        const station = document.getElementById("station").value;
        const region = document.getElementById("region").value;

        if (!rank || !name || !phone) {
            alert("กรุณาเลือกยศ ระบุชื่อ-นามสกุล และเบอร์โทรศัพท์ครับ");
            return;
        }

        const btn = document.getElementById("btnReg");
        const originalBtnText = btn.innerHTML;
        
        btn.disabled = true;
        btn.innerHTML = `<span class="flex items-center"><svg class="animate-spin h-5 w-5 mr-3 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> กำลังบันทึก...</span>`;

        try {
            const profile = await liff.getProfile();
            const fullName = rank + name; 

            const payload = {
                action: "memberRegister", // เพิ่ม action ให้ชัดเจน
                userId: profile.userId,
                pictureUrl: profile.pictureUrl,
                name: fullName, 
                phone: phone,
                email: email,
                jobLine: jobLine,
                station: station,
                region: region
            };

            // ส่งข้อมูลไปยัง GAS
            const response = await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors", // ใช้ no-cors เพื่อเลี่ยงปัญหานโยบายความปลอดภัยของบราวเซอร์
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            // เนื่องจากใช้ no-cors เราจะไม่สามารถอ่าน JSON response ได้โดยตรง 
            // แต่ถ้าส่งสำเร็จ ข้อมูลจะไปปรากฏใน Google Sheet ทันที
            alert("บันทึกข้อมูลเรียบร้อยแล้ว!");
            
            // รอสักครู่เพื่อให้ระบบทำงานเสร็จก่อนปิดหน้าต่าง
            setTimeout(() => {
                liff.closeWindow();
            }, 1500);

        } catch (err) {
            console.error("Submit Error:", err);
            alert("เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์");
            btn.disabled = false;
            btn.innerHTML = originalBtnText;
        }
    }
</script>
</body>
</html>
