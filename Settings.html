<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งค่าระบบ - กก.สืบสวน 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">

    <div class="max-w-md mx-auto min-h-screen bg-white shadow-xl flex flex-col">
        <header class="bg-indigo-600 p-6 text-white text-center rounded-b-3xl shadow-lg">
            <h1 class="text-xl font-bold italic"><i class="fas fa-cog mr-2"></i> ตั้งค่าระบบ</h1>
            <p class="text-xs opacity-80 mt-1">จัดการ Prefix และเลขรันล่าสุด</p>
        </header>

        <main class="p-6 flex-grow">
            <div id="loading" class="text-center py-10">
                <div class="animate-spin text-indigo-600 text-3xl"><i class="fas fa-circle-notch"></i></div>
                <p class="mt-2 text-sm text-gray-500">กำลังดึงข้อมูลจาก Google Sheets...</p>
            </div>

            <div id="app-form" class="hidden space-y-5 animate-fadeIn">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Prefix (ส่วนหน้า)</label>
                    <input type="text" id="prefix" placeholder="เช่น ตช 0021.23/" 
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">เลขส่งล่าสุด (Book Out)</label>
                    <input type="number" id="lastNumber" placeholder="เช่น 683" 
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">ปี พ.ศ.</label>
                    <input type="text" id="year" placeholder="เช่น 2569" 
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                </div>

                <div class="pt-4 space-y-3">
                    <button onclick="saveData()" id="btnSave" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition active:scale-95 flex justify-center items-center">
                        <i class="fas fa-save mr-2"></i> บันทึกข้อมูล
                    </button>
                    <button onclick="fetchData()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 font-medium py-3 rounded-2xl transition">
                        <i class="fas fa-sync-alt mr-2"></i> รีเฟรชข้อมูล
                    </button>
                </div>
            </div>
        </main>

        <footer class="p-4 text-center text-[10px] text-gray-400 border-t">
            Powered by GitHub + LINE LIFF
        </footer>
    </div>

    <script>
        // ใช้ URL เดิมของคุณ
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwde12sz8vLxH-14fbIGpWOpeqXVVtfADO2C90SrEH-CNnw-O8BrH_ms5-ikplQgXA/exec";
        const LIFF_ID = "2009665125-hJRQ1n2d";

        // ฟังก์ชันดึงข้อมูล (เพิ่ม ?action=getSettings)
        async function fetchData() {
            toggleLoading(true);
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getSettings`);
                const data = await res.json();
                if (data.status === "success") {
                    document.getElementById('prefix').value = data.prefix || "";
                    document.getElementById('lastNumber').value = data.lastOut || "";
                    document.getElementById('year').value = data.year || "";
                }
            } catch (e) {
                alert("โหลดข้อมูลล้มเหลว: " + e);
            } finally {
                toggleLoading(false);
            }
        }

        // ฟังก์ชันบันทึกข้อมูล (เพิ่ม action: "updateSettings")
        async function saveData() {
            const btn = document.getElementById('btnSave');
            const originalText = btn.innerHTML;
            
            const payload = {
                action: "updateSettings",
                prefix: document.getElementById('prefix').value,
                lastOut: document.getElementById('lastNumber').value,
                year: document.getElementById('year').value
            };

            if(!confirm("ยืนยันการบันทึกข้อมูล?")) return;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin mr-2"></i> กำลังบันทึก...';

            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if(result.status === "success") {
                    alert("บันทึกสำเร็จ!");
                }
            } catch (e) {
                alert("เกิดข้อผิดพลาด: " + e);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
                fetchData(); // โหลดข้อมูลใหม่เพื่อความมั่นใจ
            }
        }

        function toggleLoading(show) {
            document.getElementById('loading').classList.toggle('hidden', !show);
            document.getElementById('app-form').classList.toggle('hidden', show);
        }

        async function initLIFF() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    fetchData();
                }
            } catch (e) {
                console.error("LIFF Init Error", e);
                // ถ้าเทสในคอมแล้วติด LIFF ให้ดึงข้อมูลเลย
                fetchData();
            }
        }

        initLIFF();
    </script>
</body>
</html>
